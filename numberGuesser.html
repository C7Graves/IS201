<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Guessing Game</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      padding: 2rem;
      background: #f5f5f5;
    }
    #game {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    h1 { margin: 0 0 0.25rem; font-size: 22px; }
    p.sub { font-size: 14px; color: #666; margin: 0 0 1.5rem; }
    label { font-size: 14px; color: #555; display: block; margin-bottom: 6px; }
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      cursor: pointer;
    }
    button:hover { background: #f0f0f0; }
    #feedback { font-size: 18px; font-weight: 500; min-height: 28px; margin: 1rem 0 0.25rem; }
    #history { font-size: 13px; color: #888; min-height: 20px; margin-bottom: 0.5rem; }
    #success { font-size: 22px; font-weight: 500; color: green; display: none; margin: 1rem 0; }
    #new-game { margin-top: 16px; }
  </style>
</head>
<body>
  <div id="game">
    <h1>Number guessing game</h1>
    <p class="sub">I'm thinking of a number from 1 to 100.</p>

    <label for="guess">Your guess</label>
    <input type="number" id="guess" min="1" max="100" placeholder="Enter 1–100" />
    <button onclick="submitGuess()">Guess</button>

    <div id="feedback"></div>
    <div id="history"></div>
    <div id="success">Good guessing!</div>

    <button id="new-game" onclick="newGame()">New game</button>
  </div>

  <script>
    let secret, guesses;

    function newGame() {
      secret = Math.floor(Math.random() * 100) + 1;
      guesses = [];
      document.getElementById('feedback').textContent = '';
      document.getElementById('history').textContent = '';
      document.getElementById('success').style.display = 'none';
      document.getElementById('guess').value = '';
      document.getElementById('guess').disabled = false;
      document.querySelector('button').disabled = false;
      document.getElementById('guess').focus();
    }

    function submitGuess() {
      const input = document.getElementById('guess');
      const val = parseInt(input.value);
      if (!val || val < 1 || val > 100) {
        document.getElementById('feedback').textContent = 'Please enter a whole number from 1 to 100.';
        return;
      }
      guesses.push(val);
      if (val === secret) {
        document.getElementById('feedback').textContent = '';
        document.getElementById('success').style.display = 'block';
        input.disabled = true;
        document.querySelector('button').disabled = true;
        document.getElementById('history').textContent =
          `You got it in ${guesses.length} guess${guesses.length === 1 ? '' : 'es'}!`;
      } else {
        document.getElementById('feedback').textContent = val < secret ? 'Higher!' : 'Lower!';
        document.getElementById('history').textContent = `Guesses so far: ${guesses.join(', ')}`;
      }
      input.value = '';
      input.focus();
    }

    document.getElementById('guess').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitGuess();
    });

    newGame();
  </script>
</body>
</html>
